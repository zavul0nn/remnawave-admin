# Nginx access log in admin-panel compatible format for centralized log viewing.
# Format: TIMESTAMP | LEVEL | SOURCE | MESSAGE
log_format admin_fmt escape=none
    '$time_iso8601 | INFO    | nginx      | $status $request_method $uri ($remote_addr, ${request_time}s)';

# Map to detect known scanners/bots by User-Agent
map $http_user_agent $is_bot {
    default 0;
    ~*bot           1;
    ~*spider        1;
    ~*crawl         1;
    ~*slurp         1;
    ~*curl          1;
    ~*wget          1;
    ~*python        1;
    ~*httpx         1;
    ~*scanner       1;
    ~*masscan       1;
    ~*nmap          1;
    ~*nikto         1;
    ~*zgrab         1;
    ~*censys        1;
    ~*shodan        1;
    ""              1;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Trust upstream reverse proxies (Docker networks) to extract real client IP.
    # When an external proxy (Traefik, Caddy, nginx) forwards requests,
    # $remote_addr is the proxy's Docker IP (e.g. 172.18.0.x).
    # real_ip_header tells nginx to read the actual client IP from the header
    # set by the upstream proxy, so $remote_addr becomes the real client IP.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from fd00::/8;
    real_ip_header X-Real-IP;
    real_ip_recursive on;

    # DNS resolver for Docker internal network
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Централизованные логи в /app/logs/ (shared volume)
    access_log /app/logs/nginx_access.log admin_fmt;
    error_log  /app/logs/nginx_error.log warn;

    # Block bots/scanners — return 403 for known automated agents
    if ($is_bot) {
        return 403;
    }

    # Подавляем ошибки для известных отсутствующих файлов
    location = /favicon.ico { access_log off; log_not_found off; try_files $uri =204; }
    location = /vite.svg     { access_log off; log_not_found off; try_files $uri =204; }

    # robots.txt — always serve, even for bots (so they know to go away)
    location = /robots.txt {
        access_log off;
        allow all;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Cache static assets (без логирования)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # WebSocket proxy — node-agent (must be before /api/ location)
    location /api/v2/agent/ws {
        set $backend http://web-backend:8081;
        proxy_pass $backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # WebSocket proxy — browser
    location /api/v2/ws {
        set $backend http://web-backend:8081;
        proxy_pass $backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API proxy to backend
    location /api/ {
        set $backend http://web-backend:8081;
        proxy_pass $backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # index.html — never cache (so the browser always gets the latest chunk references)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback - all routes go to index.html
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
